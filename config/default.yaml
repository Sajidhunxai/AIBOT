# AIBotTrade Default Configuration
# Override values here without changing code.

app:
  name: AIBotTrade
  version: "1.0.0"
  timezone: UTC  # exchange/API timestamps stay UTC
  display_timezone: Asia/Karachi  # dashboard chart and labels (PKT, UTC+5)

exchange:
  name: binance_futures
  testnet: true
  hedge_mode: true
  recv_window: 10000
  reconnect_delay_seconds: 5
  max_reconnect_attempts: 10
  rate_limit_retries: 3
  rate_limit_backoff_seconds: 1.0

symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT
  - BNBUSDT

timeframes:
  - 1m
  - 5m
  - 15m
  - 1h
  - 4h

primary_timeframe: 15m

leverage:
  default: 10
  max: 20
  per_symbol:
    BTCUSDT: 10
    ETHUSDT: 10
    SOLUSDT: 10
    BNBUSDT: 10

risk:
  risk_per_trade_pct: 1.0
  max_daily_loss_pct: 3.0
  max_drawdown_pct: 10.0
  max_concurrent_positions: 4
  max_positions_per_symbol: 1
  cooldown_after_loss_minutes: 30
  signal_cooldown_minutes: 15
  max_unrealized_loss_pct: 5.0
  emergency_close_unrealized_loss_pct: 8.0
  max_total_exposure_pct: 40.0
  block_duplicate_side: true
  use_equity_for_limits: true
  atr_stop_multiplier: 2.0
  take_profit_rr: 2.0
  take_profit_mode: support_resistance  # fixed_rr | support_resistance
  sr_lookback_candles: 50
  sr_min_rr: 0.75
  sr_max_rr: 2.0
  trailing_stop_atr_multiplier: 1.5
  break_even_trigger_rr: 1.0
  position_size_method: fixed_risk  # fixed_risk | fixed_amount | kelly

strategies:
  ema_cross_rsi:
    enabled: true
    signal_mode: trend  # crossover | trend — trend trades EMA alignment, not just the cross candle
    fast_ema: 9
    slow_ema: 21
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
    rsi_filter_long_min: 40
    rsi_filter_short_max: 60

  trend_following:
    enabled: true
    ema_period: 50
    adx_period: 14
    adx_threshold: 25
    atr_period: 14
    supertrend_period: 10
    supertrend_multiplier: 3.0

  scalping:
    enabled: false
    ema_fast: 5
    ema_slow: 13
    rsi_period: 7
    bb_period: 20
    bb_std: 2.0
    min_volume_ratio: 1.2

  breakout:
    enabled: true
    lookback_period: 20
    volume_multiplier: 1.5
    atr_period: 14
    confirmation_candles: 1

  mean_reversion:
    enabled: false
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_oversold: 25
    rsi_overbought: 75
    adx_max: 20

ai_filter:
  enabled: false
  min_confidence: 0.6
  features:
    - trend
    - momentum
    - volume
    - funding
    - open_interest
  retrain_interval_days: 7

orders:
  default_type: market  # market | limit
  limit_offset_pct: 0.05
  time_in_force: GTC
  place_exchange_sl_tp: true
  update_exchange_trailing_sl: true  # break-even only (trailing multiplier 0 disables trail tightening)
  min_trailing_sl_move_pct: 0.05  # minimum SL change before replacing exchange order

market_data:
  candle_limit: 500
  orderbook_depth: 20
  funding_rate_interval_hours: 8
  websocket_ping_interval: 30

backtest:
  initial_balance: 10000.0
  commission_pct: 0.04
  slippage_pct: 0.02
  start_date: "2024-01-01"
  end_date: null

notifications:
  telegram:
    enabled: false
    notify_on_entry: true
    notify_on_exit: true
    notify_on_error: true
    daily_report_hour: 0
    weekly_report_day: monday
    weekly_report_hour: 0

paper_trading:
  enabled: true
  initial_balance: 10000.0
  simulate_slippage: true
  slippage_pct: 0.02

logging:
  level: INFO
  rotation: size
  max_bytes: 10485760
  backup_count: 10
  format: json

database:
  pool_size: 10
  max_overflow: 20
  echo: false
