name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aibottrade
          POSTGRES_PASSWORD: aibottrade
          POSTGRES_DB: aibottrade
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Black
        run: black --check .

      - name: Ruff
        run: ruff check .

      - name: MyPy
        run: mypy api core exchange strategies indicators risk ai backtest database notifications utils --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://aibottrade:aibottrade@localhost:5432/aibottrade
          DATABASE_SYNC_URL: postgresql://aibottrade:aibottrade@localhost:5432/aibottrade
        run: pytest tests/ -v --tb=short
