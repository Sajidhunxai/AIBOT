name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    if: github.event_name == 'push'

    steps:
      - name: Deploy on server
        run: |
          cd ~/AIBOT
          git fetch origin main
          git reset --hard origin/main
          sed -i 's/\r$//' scripts/*.sh docker/entrypoint.sh 2>/dev/null || true
          chmod +x scripts/ec2-deploy-update.sh
          COMPOSE_FILE=docker-compose.ec2-small.yml bash scripts/ec2-deploy-update.sh
